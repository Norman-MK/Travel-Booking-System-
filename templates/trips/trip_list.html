<!doctype html>
<html>
<head><title>Available Trips</title></head>
<body>
  <h1>Available Trips</h1>
  <ul>
    {% for trip in trips %}
      <li>
        <a href="{% url 'trips:trip_detail' trip.pk %}">
          {{ trip.title }} — {{ trip.destination }} ({{ trip.start_date }}) - ${{ trip.price }}
        </a>
      </li>
    {% empty %}
      <li>No trips available yet.</li>
    {% endfor %}
  </ul>
</body>
</html>
