{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>{% block title %}Travel Booking{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <header class="navbar">
    <div class="container" style="display:flex;align-items:center;gap:12px;">
      <a href="/" style="font-weight:700;color:white;text-decoration:none">Travel Booking</a>

      <nav style="margin-left:8px;">
        <a href="{% url 'trips:trip_list' %}" style="color:white;margin-right:8px">Trips</a>
        <a href="{% url 'bookings:index' %}" style="color:white;margin-right:8px">Bookings</a>
      </nav>

      <div style="margin-left:auto;">
        {% if user.is_authenticated %}
          <span style="color:white;margin-right:10px">Hi, {{ user.get_full_name|default:user.username }}</span>
          <a href="{% url 'bookings:my_bookings' %}" class="btn">My bookings</a>
          <!-- logout link (we defined logout_short previously) -->
          <a href="{% url 'logout_short' %}" class="btn" style="margin-left:8px">Logout</a>
        {% else %}
          <a href="{% url 'login_short' %}" class="btn">Login</a>
        {% endif %}
      </div>
    </div>
  </header>

  <main class="container" style="padding-top:18px;">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
